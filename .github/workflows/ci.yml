name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      # The same gates midas itself preaches (OPS-0002 / CLI-0008).
      - name: fmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

      # Dogfood: midas check must be clean on midas (the standard governs itself, SPEC §9).
      - name: midas check (self)
        run: cargo run --quiet -- check --root .
